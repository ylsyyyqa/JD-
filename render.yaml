services:
  - type: web
    name: jd-zhixi-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: ALLOWED_ORIGINS
        value: https://ylsyyyqa.github.io
      - key: PORT
        value: "10000"
